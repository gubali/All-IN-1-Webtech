<div class="max-w-5xl mx-auto p-4">
  <!-- Search -->
  <div class="mb-4">
    <input
      type="text"
      (input)="getSearchText($event)"
      placeholder="Search users..."
      class="w-full border border-gray-300 rounded-xl px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <!-- Table -->
  <div class="overflow-x-auto bg-white rounded-xl shadow-sm border border-gray-200">
    <table class="min-w-full text-sm text-left">
      <!-- Header -->
      <thead class="bg-gray-100 text-gray-700 uppercase text-xs tracking-wider">
        <tr>
          <th class="px-6 py-3">Name</th>
          <th class="px-6 py-3">Email</th>
          <th class="px-6 py-3">Website</th>
        </tr>
      </thead>

      <!-- Body -->
      <tbody>
        @for (user of filterUserData(); track user.name) {
          <tr class="border-t hover:bg-gray-50 transition">
            <td class="px-6 py-4 font-medium text-gray-900">
              {{ user.name }}
            </td>

            <td class="px-6 py-4 text-gray-600">
              {{ user.email }}
            </td>

            <td class="px-6 py-4 text-blue-600 hover:underline">
              {{ user.website }}
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
