<header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
  <div class="container mx-auto flex justify-between items-center py-4 px-6">
    <!-- Logo -->
    <h1 class="text-xl font-bold tracking-wide">My App</h1>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex space-x-2 items-center">
      <a
        routerLink="/todo"
        routerLinkActive="bg-blue-800"
        class="px-4 py-2 rounded-lg hover:bg-blue-700 transition"
      >
        ToDo (Signals)
      </a>

      <a
        routerLink="/welcome"
        routerLinkActive="bg-blue-800"
        class="px-4 py-2 rounded-lg hover:bg-blue-700 transition"
      >
        Welcome HandsOn
      </a>
      <a
        routerLink="/rxjs"
        routerLinkActive="bg-blue-800"
        class="px-4 py-2 rounded-lg hover:bg-blue-700 transition"
      >
        Rxjs - Operators
      </a>
    </nav>

    <!-- Mobile Button -->
    <button class="md:hidden focus:outline-none" (click)="toggleMenu()" aria-label="Toggle Menu">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div class="md:hidden bg-blue-700 px-6 pb-4 space-y-2">
      <a routerLink="/todo" (click)="closeMenu()" class="block py-2 px-3 rounded hover:bg-blue-800">
        ToDo (Signals)
      </a>

      <a
        routerLink="/welcome"
        (click)="closeMenu()"
        class="block py-2 px-3 rounded hover:bg-blue-800"
      >
        Welcome HandsOn
      </a>
    </div>
  }
</header>

<main class="container mx-auto mt-6 px-6">
  <router-outlet></router-outlet>
</main>
